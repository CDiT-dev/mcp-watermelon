services:
  mcp-watermelon:
    build: .
    ports:
      - "${HOST_PORT:-8002}:8000"
    environment:
      - WATERMELON_API_KEY=${WATERMELON_API_KEY}
      - WATERMELON_SECRET_KEY=${WATERMELON_SECRET_KEY}
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MCP_API_KEY=${MCP_API_KEY:-}
      - FASTMCP_HOME=/data/fastmcp
    volumes:
      - fastmcp-data:/data/fastmcp
    restart: unless-stopped

volumes:
  fastmcp-data:
